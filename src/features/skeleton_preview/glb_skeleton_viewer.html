<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GLB Skeleton Viewer</title>
    <link rel="stylesheet" href="glb_skeleton_viewer.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="viewer"></canvas>
    <div class="toolbar">
      <input id="path" value="/data/assets/previews/cmu_01_01.glb" />
      <input id="humanoidPath" value="/data/assets/humanoid/cmu_humanoid.glb" />
      <button id="load">Load</button>
      <button id="toggleHumanoid">Hide Humanoid</button>
      <button id="play">Pause</button>
      <button id="reset">Reset View</button>
    </div>
    <div id="status" class="status">Loading default GLB...</div>

    <script type="module">
      import * as THREE from "three";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { MeshoptDecoder } from "three/addons/libs/meshopt_decoder.module.js";

      const canvas = document.querySelector("#viewer");
      const pathInput = document.querySelector("#path");
      const humanoidPathInput = document.querySelector("#humanoidPath");
      const loadButton = document.querySelector("#load");
      const toggleHumanoidButton = document.querySelector("#toggleHumanoid");
      const playButton = document.querySelector("#play");
      const resetButton = document.querySelector("#reset");
      const status = document.querySelector("#status");

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x0b0d10, 1);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 100000);
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      const clock = new THREE.Clock();
      const loader = new GLTFLoader();
      const dracoLoader = new DRACOLoader();
      dracoLoader.setDecoderPath(
        "https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/gltf/"
      );
      loader.setDRACOLoader(dracoLoader);
      loader.setMeshoptDecoder(MeshoptDecoder);
      let currentRoot = null;
      let currentDisplayGroup = null;
      let currentHumanoidRoot = null;
      let currentHelper = null;
      let currentBonePoints = null;
      let currentBoneLines = null;
      let mixer = null;
      let humanoidMixer = null;
      let playing = true;
      let humanoidVisible = true;
      let assetsLoading = false;
      let loadToken = 0;

      scene.add(new THREE.HemisphereLight(0xffffff, 0x334155, 2.2));

      const grid = new THREE.GridHelper(200, 20, 0x1f2937, 0x111827);
      scene.add(grid);

      const axes = new THREE.AxesHelper(50);
      axes.scale.setScalar(0.5);
      scene.add(axes);

      function setStatus(message) {
        status.textContent = message;
      }

      function resize() {
        const width = window.innerWidth;
        const height = window.innerHeight;
        renderer.setSize(width, height, false);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      }

      function clearCurrent() {
        assetsLoading = false;
        if (currentDisplayGroup) {
          scene.remove(currentDisplayGroup);
          currentDisplayGroup = null;
        }
        if (currentHelper) {
          scene.remove(currentHelper);
          currentHelper.geometry.dispose();
          currentHelper = null;
        }
        if (currentBonePoints) {
          scene.remove(currentBonePoints);
          currentBonePoints.geometry.dispose();
          currentBonePoints.material.dispose();
          currentBonePoints = null;
        }
        if (currentBoneLines) {
          scene.remove(currentBoneLines);
          currentBoneLines.geometry.dispose();
          currentBoneLines.material.dispose();
          currentBoneLines = null;
        }
        currentRoot = null;
        currentHumanoidRoot = null;
        mixer = null;
        humanoidMixer = null;
      }

      function collectStats(root) {
        const stats = {
          objects: 0,
          bones: 0,
          meshes: 0,
          skinnedMeshes: 0
        };
        root.traverse((object) => {
          stats.objects += 1;
          if (object.isBone) stats.bones += 1;
          if (object.isMesh) stats.meshes += 1;
          if (object.isSkinnedMesh) stats.skinnedMeshes += 1;
        });
        return stats;
      }

      function collectObjectNames(root) {
        const names = new Set();
        root.traverse((object) => {
          if (object.name) names.add(object.name);
        });
        return names;
      }

      function trackTargetName(trackName) {
        const boneMatch = trackName.match(/\.?bones\[([^\]]+)\]/);
        if (boneMatch) return boneMatch[1];

        const propertyIndex = trackName.lastIndexOf(".");
        if (propertyIndex < 0) return trackName;

        const path = trackName.slice(0, propertyIndex);
        const parts = path.split(/[/.]/).filter(Boolean);
        return parts[parts.length - 1] || path;
      }

      function countBindableTracks(root, clip) {
        if (!clip) return { matched: 0, total: 0 };

        const names = collectObjectNames(root);
        let matched = 0;
        for (const track of clip.tracks) {
          if (names.has(trackTargetName(track.name))) {
            matched += 1;
          }
        }
        return { matched, total: clip.tracks.length };
      }

      function collectBoneBounds(root) {
        const box = new THREE.Box3();
        const point = new THREE.Vector3();
        let count = 0;

        root.updateMatrixWorld(true);
        root.traverse((object) => {
          if (!object.isBone) return;
          object.getWorldPosition(point);
          box.expandByPoint(point);
          count += 1;
        });

        return count > 0 ? box : null;
      }

      function fitCamera(root) {
        let box = collectBoneBounds(root);
        if (!box) {
          box = new THREE.Box3().setFromObject(root);
        }

        if (box.isEmpty()) {
          box = new THREE.Box3(
            new THREE.Vector3(-1, -1, -1),
            new THREE.Vector3(1, 1, 1)
          );
        }

        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        const radius = Math.max(size.x, size.y, size.z, 1);
        controls.target.copy(center);
        camera.position.set(center.x, center.y - radius * 2.5, center.z + radius * 0.8);
        camera.near = Math.max(radius / 1000, 0.01);
        camera.far = Math.max(radius * 20, 1000);
        camera.updateProjectionMatrix();
        controls.update();
      }

      function normalizeDisplayGroup(group, root) {
        const box = collectBoneBounds(root);
        if (!box || box.isEmpty()) {
          return { scale: 1, radius: 100, center: new THREE.Vector3() };
        }

        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        const radius = Math.max(size.x, size.y, size.z, 1);
        const scale = 100 / radius;
        group.scale.setScalar(scale);
        root.position.sub(center);
        return { scale, radius, center };
      }

      function fitNormalizedCamera() {
        controls.target.set(0, 0, 0);
        camera.position.set(0, -260, 90);
        camera.near = 0.01;
        camera.far = 2000;
        camera.updateProjectionMatrix();
        controls.update();
      }

      function createBoneLines(root) {
        const geometry = new THREE.BufferGeometry();
        const material = new THREE.LineBasicMaterial({
          color: 0x22d3ee,
          depthTest: false,
          transparent: true,
          opacity: 1
        });
        const lines = new THREE.LineSegments(geometry, material);
        lines.frustumCulled = false;
        lines.renderOrder = 10;
        lines.userData.root = root;
        updateBoneLines(lines);
        return lines;
      }

      function updateBoneLines(lines) {
        const root = lines.userData.root;
        const positions = [];
        const a = new THREE.Vector3();
        const b = new THREE.Vector3();

        root.updateMatrixWorld(true);
        root.traverse((object) => {
          if (!object.isBone || !object.parent || !object.parent.isBone) return;
          object.parent.getWorldPosition(a);
          object.getWorldPosition(b);
          positions.push(a.x, a.y, a.z, b.x, b.y, b.z);
        });

        lines.geometry.setAttribute(
          "position",
          new THREE.Float32BufferAttribute(positions, 3)
        );
        lines.geometry.computeBoundingSphere();
      }

      function createBonePoints(root) {
        const geometry = new THREE.BufferGeometry();
        const material = new THREE.PointsMaterial({
          color: 0xffffff,
          size: 6,
          sizeAttenuation: false
        });
        const points = new THREE.Points(geometry, material);
        points.frustumCulled = false;
        points.userData.root = root;
        updateBonePoints(points);
        return points;
      }

      function updateBonePoints(points) {
        const root = points.userData.root;
        const positions = [];
        const point = new THREE.Vector3();

        root.updateMatrixWorld(true);
        root.traverse((object) => {
          if (!object.isBone) return;
          object.getWorldPosition(point);
          positions.push(point.x, point.y, point.z);
        });

        points.geometry.setAttribute(
          "position",
          new THREE.Float32BufferAttribute(positions, 3)
        );
        points.geometry.computeBoundingSphere();
      }

      async function loadHumanoid(path, clip, normalized, token) {
        if (!path) return "Humanoid: not loaded";

        const gltf = await loader.loadAsync(path);
        if (token !== loadToken || !currentDisplayGroup) {
          return "Humanoid: skipped";
        }

        currentHumanoidRoot = gltf.scene;
        currentHumanoidRoot.position.sub(normalized.center);
        currentHumanoidRoot.visible = humanoidVisible;
        currentDisplayGroup.add(currentHumanoidRoot);

        const bindable = countBindableTracks(currentHumanoidRoot, clip);
        if (clip) {
          humanoidMixer = new THREE.AnimationMixer(currentHumanoidRoot);
          humanoidMixer.clipAction(clip).play();
        }

        const stats = collectStats(currentHumanoidRoot);
        return [
          `Humanoid: ${path}`,
          `Humanoid objects: ${stats.objects}`,
          `Humanoid bones: ${stats.bones}`,
          `Humanoid meshes: ${stats.meshes}`,
          `Humanoid skinned meshes: ${stats.skinnedMeshes}`,
          `Humanoid bindable tracks: ${bindable.matched}/${bindable.total}`
        ].join("\n");
      }

      function updateHumanoidButton() {
        toggleHumanoidButton.textContent = humanoidVisible
          ? "Hide Humanoid"
          : "Show Humanoid";
      }

      function loadGlb(path) {
        const token = ++loadToken;
        clearCurrent();
        assetsLoading = true;
        setStatus(`Loading ${path}...`);

        loader.load(
          path,
          async (gltf) => {
            if (token !== loadToken) return;

            currentRoot = gltf.scene;
            currentDisplayGroup = new THREE.Group();
            currentDisplayGroup.add(currentRoot);
            scene.add(currentDisplayGroup);

            const normalized = normalizeDisplayGroup(currentDisplayGroup, currentRoot);

            currentHelper = new THREE.SkeletonHelper(currentRoot);
            currentHelper.material = new THREE.LineBasicMaterial({
              color: 0x22d3ee,
              depthTest: false,
              transparent: true,
              opacity: 1
            });
            currentHelper.visible = true;
            currentHelper.frustumCulled = false;
            scene.add(currentHelper);

            currentBoneLines = createBoneLines(currentRoot);
            scene.add(currentBoneLines);

            currentBonePoints = createBonePoints(currentRoot);
            scene.add(currentBonePoints);

            if (gltf.animations.length > 0) {
              mixer = new THREE.AnimationMixer(currentRoot);
              mixer.clipAction(gltf.animations[0]).play();
            }

            fitNormalizedCamera();
            const stats = collectStats(currentRoot);
            let humanoidStatus = "";
            try {
              humanoidStatus = await loadHumanoid(
                humanoidPathInput.value.trim(),
                gltf.animations[0],
                normalized,
                token
              );
            } catch (error) {
              humanoidStatus = `Humanoid failed: ${error.message || error}`;
            }

            if (token !== loadToken) return;

            if (mixer) {
              mixer.setTime(0);
            }
            if (humanoidMixer) {
              humanoidMixer.setTime(0);
            }
            clock.getDelta();
            assetsLoading = false;
            playing = true;
            playButton.textContent = "Pause";

            setStatus(
              [
                `Loaded: ${path}`,
                `Animations: ${gltf.animations.length}`,
                `Objects: ${stats.objects}`,
                `Bones: ${stats.bones}`,
                `Meshes: ${stats.meshes}`,
                `Skinned meshes: ${stats.skinnedMeshes}`,
                `Original radius: ${normalized.radius.toFixed(3)}`,
                `Display scale: ${normalized.scale.toFixed(6)}`,
                humanoidStatus
              ].join("\n")
            );
          },
          undefined,
          (error) => {
            assetsLoading = false;
            setStatus(`Failed to load ${path}\n${error.message || error}`);
          }
        );
      }

      function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if (mixer && playing && !assetsLoading) {
          mixer.update(delta);
        }
        if (humanoidMixer && playing && !assetsLoading) {
          humanoidMixer.update(delta);
        }
        if (currentBoneLines) {
          updateBoneLines(currentBoneLines);
        }
        if (currentBonePoints) {
          updateBonePoints(currentBonePoints);
        }
        controls.update();
        renderer.render(scene, camera);
      }

      loadButton.addEventListener("click", () => loadGlb(pathInput.value.trim()));
      toggleHumanoidButton.addEventListener("click", () => {
        humanoidVisible = !humanoidVisible;
        if (currentHumanoidRoot) {
          currentHumanoidRoot.visible = humanoidVisible;
        }
        updateHumanoidButton();
      });
      pathInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          loadGlb(pathInput.value.trim());
        }
      });
      humanoidPathInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          loadGlb(pathInput.value.trim());
        }
      });
      playButton.addEventListener("click", () => {
        playing = !playing;
        playButton.textContent = playing ? "Pause" : "Play";
      });
      resetButton.addEventListener("click", () => {
        if (currentDisplayGroup) {
          fitNormalizedCamera();
        }
      });
      window.addEventListener("resize", resize);

      resize();
      updateHumanoidButton();
      loadGlb(pathInput.value.trim());
      animate();
    </script>
  </body>
</html>
